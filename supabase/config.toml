# ========================================
# Cron Jobs Configuration
# ========================================
# Supabase Dashboard で pg_cron を使用してスケジュール設定してください
#
# 設定手順:
# 1. https://app.supabase.com/project/ppqgtbjykitqtiaisyji/database/cron-jobs
# 2. "Create a new cron job" をクリック
# 3. 以下のSQLを使用してジョブを作成
#
# ライセンス期限チェック（毎日 00:00 UTC）:
#   SELECT net.http_post(
#     url := 'https://ppqgtbjykitqtiaisyji.supabase.co/functions/v1/check-expired-licenses',
#     headers := '{"Content-Type": "application/json"}'::jsonb,
#     body := '{"scheduled": true}'::jsonb
#   );
#   Schedule: 0 0 * * *
#
# 通知イベント処理（毎分）:
#   SELECT net.http_post(
#     url := 'https://ppqgtbjykitqtiaisyji.supabase.co/functions/v1/process-notification-events',
#     headers := '{"Content-Type": "application/json"}'::jsonb,
#     body := jsonb_build_object('timestamp', now()::text)
#   );
#   Schedule: * * * * *
#
# 詳細は docs/CRON_SETUP.md を参照
# ========================================